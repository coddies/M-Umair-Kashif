<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Résumé - Muhammad Umair Kashif</title>
  <style>
    body, html {
      margin: 0;
      padding: 0;
      height: 100%;
      overflow: hidden;
      background-color: #1a1a1a;
      font-family: system-ui, -apple-system, sans-serif;
    }
    iframe {
      width: 100%;
      height: 100%;
      border: none;
    }
    #loader {
      position: absolute;
      top: 50%;
      left: 50%;
      transform: translate(-50%, -50%);
      color: rgba(250, 204, 21, 0.9);
      font-weight: 600;
      letter-spacing: 1px;
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 12px;
    }
    .spinner {
      width: 30px;
      height: 30px;
      border: 3px solid rgba(250, 204, 21, 0.2);
      border-top-color: #facc15;
      border-radius: 50%;
      animation: spin 1s linear infinite;
    }
    @keyframes spin {
      to { transform: rotate(360deg); }
    }
  </style>
</head>
<body>
  <div id="loader">
    <div class="spinner"></div>
    <span>Loading Résumé...</span>
  </div>
  
  <iframe id="pdf-frame" title="Resume PDF"></iframe>

  <script>
    // Fetch the PDF as a blob to bypass IDM interception
    const pdfUrl = 'assets/documents/cv/Muhammad_Umair_Kashif_Resume.pdf';
    
    fetch(pdfUrl)
      .then(function(response) {
        if (!response.ok) throw new Error('Network response was not ok');
        return response.blob();
      })
      .then(function(blob) {
        // Create an object URL for the blob
        const blobUrl = URL.createObjectURL(blob);
        
        // Load the blob URL into the iframe
        const iframe = document.getElementById('pdf-frame');
        iframe.src = blobUrl;
        
        // Hide loader when iframe finishes loading
        iframe.onload = function() {
          document.getElementById('loader').style.display = 'none';
        };
      })
      .catch(function(error) {
        console.error('Error loading PDF:', error);
        document.getElementById('loader').innerHTML = '<span>Failed to load Résumé. Please try downloading it directly.</span>';
      });
  </script>
</body>
</html>
